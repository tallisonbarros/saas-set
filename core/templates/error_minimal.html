<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b10;
        --panel: rgba(10, 14, 20, 0.68);
        --panel-border: rgba(255, 164, 84, 0.18);
        --text: rgba(245, 247, 250, 0.92);
        --muted: rgba(223, 228, 235, 0.62);
        --accent: #ff8a3d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 138, 61, 0.18), transparent 22rem),
          radial-gradient(circle at 50% 42%, rgba(255, 138, 61, 0.1), transparent 34rem),
          linear-gradient(180deg, #0a0d12 0%, #07090d 100%);
        color: var(--text);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      body {
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .orb {
        position: absolute;
        left: 50%;
        top: 44%;
        width: min(54vw, 520px);
        height: min(54vw, 520px);
        border-radius: 999px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255, 138, 61, 0.34) 0%, rgba(255, 138, 61, 0.08) 42%, transparent 72%);
        filter: blur(42px);
        opacity: 0.8;
        animation: orbPulse 3.2s ease-in-out infinite;
        pointer-events: none;
      }

      .shell {
        position: relative;
        width: min(420px, 100%);
        padding: 28px 24px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
        text-align: center;
      }

      .lock-wrap {
        width: 92px;
        height: 92px;
        margin: 0 auto 18px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: radial-gradient(circle, rgba(255, 138, 61, 0.16), rgba(255, 138, 61, 0.04));
        box-shadow: 0 0 0 1px rgba(255, 164, 84, 0.08), 0 0 36px rgba(255, 138, 61, 0.18);
        animation: lockPulse 2.2s ease-in-out infinite;
      }

      .lock {
        width: 36px;
        height: 36px;
        color: var(--accent);
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 214, 184, 0.54);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 3.8vw, 1.7rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 0.96rem;
        line-height: 1.6;
      }

      .message {
        color: rgba(255, 232, 217, 0.9);
      }

      @keyframes lockPulse {
        0%,
        100% {
          transform: scale(0.98);
          box-shadow: 0 0 0 1px rgba(255, 164, 84, 0.08), 0 0 28px rgba(255, 138, 61, 0.14);
        }
        50% {
          transform: scale(1.02);
          box-shadow: 0 0 0 1px rgba(255, 164, 84, 0.14), 0 0 54px rgba(255, 138, 61, 0.24);
        }
      }

      @keyframes orbPulse {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(0.94);
          opacity: 0.68;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.06);
          opacity: 0.96;
        }
      }
    </style>
  </head>
  <body>
    <div class="orb" aria-hidden="true"></div>
    <main class="shell" role="main" aria-labelledby="error-title">
      <div class="lock-wrap" aria-hidden="true">
        <svg class="lock" viewBox="0 0 24 24" fill="none">
          <path d="M7.5 10V8.5a4.5 4.5 0 1 1 9 0V10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <rect x="5" y="10" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.7"/>
          <path d="M12 13.5v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="eyebrow">{{ status_code }}</p>
      <h1 id="error-title">{{ title }}</h1>
      <p class="message">{{ message }}</p>
    </main>
  </body>
</html>
